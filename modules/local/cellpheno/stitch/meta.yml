name: "cellpheno_stitch"
description: NIS-guided phase-correlation tile-stitching transform for one whole brain
keywords:
  - lightsheet microscopy
  - image stitching
  - phase correlation
  - whole brain
tools:
  - "cellpheno_stitch":
      description: "Estimates the per-tile stitching transform of a brain from NIS results
        and raw light-sheet images. Wraps image_stitch/phase_correlation_stitch.get_stitch_tform."
      homepage: "https://github.com/Chrisa142857/Lightsheet_microscopy_image_3D_nuclei_instance_segmentation"
      licence:
        - "MIT"
input:
  - - meta:
        type: map
        description: |
          Brain meta map, e.g. `[ id:'test_brain', pair:'test_pair', ncol:2, nrow:2 ]`.
    - tile_tars:
        type: file
        description: Per-tile tars from CELLPHENO_COORDTOBBOX (grouped by brain).
        pattern: "*.tar"
    - image_dir:
        type: directory
        description: Raw light-sheet image directory for this brain.
output:
  tform:
    - - meta:
          type: map
          description: Brain meta map.
      - "NIS_tranform/${meta.id}_tform_refine.json":
          type: file
          description: Refined stitching transform (JSON) for the brain.
          pattern: "*_tform_refine.json"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions.
        pattern: "versions.yml"
authors:
  - "@Chrisa142857"
maintainers:
  - "@Chrisa142857"
