name: "cellpheno_brainmap"
description: Fuse stitched NIS tiles into a downsampled whole-brain map (NIfTI)
keywords:
  - lightsheet microscopy
  - whole brain
  - cell count
  - brain map
tools:
  - "cellpheno_brainmap":
      description: "Applies the stitch transform, de-duplicates NIS IDs across tile
        overlaps and fuses a downsampled whole-brain cell-count / avg-volume map.
        Wraps brainmap_nogui.Brainmap."
      homepage: "https://github.com/Chrisa142857/Lightsheet_microscopy_image_3D_nuclei_instance_segmentation"
      licence:
        - "MIT"
input:
  - - meta:
        type: map
        description: |
          Brain meta map, e.g. `[ id:'test_brain', pair:'test_pair', ncol:2, nrow:2 ]`.
    - tile_tars:
        type: file
        description: Per-tile tars from CELLPHENO_COORDTOBBOX (grouped by brain).
        pattern: "*.tar"
    - tform:
        type: file
        description: Stitch transform JSON from CELLPHENO_STITCH.
        pattern: "*_tform_refine.json"
output:
  brainmap:
    - - meta:
          type: map
          description: Brain meta map.
      - "*.nii.gz":
          type: file
          description: Fused downsampled whole-brain map.
          pattern: "*.nii.gz"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions.
        pattern: "versions.yml"
authors:
  - "@Chrisa142857"
maintainers:
  - "@Chrisa142857"
